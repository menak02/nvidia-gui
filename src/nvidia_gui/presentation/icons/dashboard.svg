<?xml version="1.0" encoding="UTF-8"?>
<!-- nvidia-gui nav icon: dashboard (ORIGINAL line drawing; MIT). A 2x2 grid
     of small rounded squares -- the "overview/quadrants" abstraction for the
     telemetry dashboard. No brand marks, no third-party glyphs. -->
<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
     fill="none" stroke="#76b900" stroke-width="1.7"
     stroke-linecap="round" stroke-linejoin="round">
  <rect x="3.5" y="3.5" width="7" height="7" rx="1.5"/>
  <rect x="13.5" y="3.5" width="7" height="7" rx="1.5"/>
  <rect x="3.5" y="13.5" width="7" height="7" rx="1.5"/>
  <rect x="13.5" y="13.5" width="7" height="7" rx="1.5"/>
</svg>
