# nvidia-gui bundled feature baseline — the OFFLINE FLOOR of per-game NVIDIA
# feature detection. Read by adapters.feature_detection; merged UNDER a user
# override and UNDER an online community-DB lookup, ABOVE install-dir/prefix
# DLL probes. Values are best-known-CONSERVATIVE: a feature is set true here
# only when reasonably confident, so the bundled floor can't silently claim a
# game supports a feature it doesn't (the old unconditional-toggle bug). The
# online DB + the install-dir DLL probe refine these at runtime, and anything
# not listed simply falls through to DLL probes / UNKNOWN.
#
# Schema:  [[games]]  appid=< steam appid string >
#                      dlss_sr=<bool>  dlss_fg=<bool>  reflex=<bool>  rt=<bool>
#                      note="<optional>"

